<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Confraria | Agendamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>BARBEARIA CONFRARIA</h1>
            <p>Onde o estilo encontra a tradição.</p>
        </div>
    </header>

    <section class="booking-container">
        <div class="form-box">
            <h2>Reserve seu Horário</h2>
            <form id="agendamentoForm">
                <div class="input-group">
                    <label>Seu Nome</label>
                    <input type="text" id="nome" placeholder="Ex: Daniel Silva" required>
                </div>

                <div class="input-group">
                    <label>Serviço</label>
                    <select id="servico">
                        <option value="Corte Simples">Corte Simples</option>
                        <option value="Barba Clássica">Barba Clássica</option>
                        <option value="Combo (Cabelo e Barba)">Combo Completo</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Data e Hora</label>
                    <input type="datetime-local" id="dataHora" required>
                </div>

                <button type="submit" class="btn-enviar">CONFIRMAR VIA WHATSAPP</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
